<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBTOOLSGET - RAZORDEV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            background: url('https://files.catbox.moe/y9qunf.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 0;
        }
        
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff0040;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,0,64,0.5);
            transition: all 0.3s;
        }
        
        .music-control:hover { transform: scale(1.1); }
        .music-control i { color: white; font-size: 24px; }
        
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-bottom: 2px solid #ff0040;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        
        .logo { font-size: 24px; font-weight: 800; color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        .logo i { color: #ff0040; margin-right: 10px; }
        .badge { background: rgba(255,0,64,0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: #ff0040; }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        
        .card {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #ff0040;
            box-shadow: 0 0 30px rgba(255,0,64,0.2);
        }
        
        /* LOGIN FORM */
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0f0f1a;
            border: 1px solid #ff0040;
            border-radius: 10px;
            color: #00ff41;
            font-size: 14px;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff0040, #ff0066);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .login-error { color: #ff0040; margin-top: 10px; }
        
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .url-input {
            flex: 1;
            padding: 14px 18px;
            background: #0f0f1a;
            border: 1px solid #ff0040;
            border-radius: 10px;
            color: #00ff41;
            font-size: 14px;
            font-family: monospace;
        }
        .btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff0040, #ff0066);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }
        .btn-secondary { background: #1f2937; border: 1px solid #ff0040; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,0,64,0.3); }
        
        .status {
            background: rgba(15,15,26,0.9);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 3px solid #ff0040;
            color: #00ff41;
        }
        
        .loader { display: none; text-align: center; padding: 30px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,0,64,0.2);
            border-top-color: #ff0040;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(15,15,26,0.9);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid #ff0040;
        }
        .stat-number { font-size: 28px; font-weight: 700; color: #ff0040; }
        .stat-label { font-size: 11px; color: #888; margin-top: 5px; }
        
        .preview-area {
            margin-top: 25px;
            display: none;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-tabs { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-btn {
            background: #0f0f1a;
            border: 1px solid #ff0040;
            padding: 8px 16px;
            border-radius: 8px;
            color: #00ff41;
            cursor: pointer;
            font-size: 12px;
        }
        .tab-btn.active { background: #ff0040; color: #fff; }
        .preview-content {
            background: rgba(15,15,26,0.95);
            border-radius: 12px;
            padding: 20px;
            max-height: 500px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #00ff41;
        }
        
        /* ENCRYPTOR SECTION */
        .encrypt-section {
            margin-top: 30px;
            border-top: 1px solid #ff0040;
            padding-top: 25px;
        }
        .encrypt-title {
            color: #ff0040;
            margin-bottom: 15px;
            font-size: 20px;
        }
        textarea {
            width: 100%;
            padding: 14px;
            background: #0f0f1a;
            border: 1px solid #ff0040;
            border-radius: 10px;
            color: #00ff41;
            font-family: monospace;
            margin-bottom: 15px;
        }
        select {
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #ff0040;
            border-radius: 10px;
            color: #00ff41;
            margin-right: 10px;
        }
        .encrypt-result {
            background: rgba(15,15,26,0.95);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            word-break: break-all;
        }
        .copy-btn {
            background: #00ff41;
            color: black;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .download-btn {
            display: inline-block;
            background: #00ff41;
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<audio id="bgMusic" loop autoplay>
    <source src="https://files.catbox.moe/5xp4vp.mp3" type="audio/mpeg">
</audio>

<div class="music-control" id="musicControl">
    <i class="fas fa-music" id="musicIcon"></i>
</div>

<div class="header">
    <div class="logo"><i class="fas fa-skull"></i> WEBTOOLSGET</div>
    <div class="badge"><i class="fas fa-dragon"></i> RAZOR TOOLSGET</div>
</div>

<div class="container" id="appContainer">
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-box card">
        <h2 style="color:#ff0040; margin-bottom:20px;"><i class="fas fa-lock"></i> LOGIN</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> ENTER</button>
        <div id="loginError" class="login-error"></div>
    </div>

    <!-- MAIN APP (HIDDEN UNTIL LOGIN) -->
    <div id="mainApp" style="display:none;">
        <div class="card">
            <div class="input-group">
                <input type="text" id="targetUrl" class="url-input" placeholder="https://example.com" value="https://">
                <button class="btn" id="stealBtn"><i class="fas fa-bolt"></i> STEAL CODE</button>
                <button class="btn btn-secondary" id="previewBtn"><i class="fas fa-eye"></i> PREVIEW</button>
            </div>
            
            <div class="status" id="statusMsg">
                <i class="fas fa-lock"></i> Enter a URL to steal source code
            </div>
            
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div>Stealing source code...</div>
            </div>
            
            <div class="result-stats" id="stats" style="display: none;"></div>
            
            <div class="preview-area" id="previewArea">
                <div class="preview-header">
                    <div class="preview-tabs" id="tabs"></div>
                    <button class="btn-secondary" id="closePreviewBtn" style="padding: 6px 12px;"><i class="fas fa-times"></i> Close</button>
                </div>
                <div class="preview-content" id="previewContent"></div>
            </div>
            
            <div id="downloadSection" style="display: none; text-align: center;">
                <a href="#" id="downloadLink" class="download-btn"><i class="fas fa-download"></i> DOWNLOAD ALL FILES (JSON)</a>
            </div>

            <!-- ENCRYPTOR SADIS SECTION -->
            <div class="encrypt-section">
                <div class="encrypt-title"><i class="fas fa-skull-crossbones"></i> 🔐 ENCRYPTOR SADIS - HARD + NAMA + ENCHARD</div>
                <textarea id="plainText" rows="4" placeholder="Masukkan teks atau kode yang mau dienkripsi..."></textarea>
                <div>
                    <select id="encryptMode">
                        <option value="hard">🔥 HARD ENC (XOR+Base64+Reverse+Rot13)</option>
                        <option value="nama">📛 NAMA ENC (Custom Cipher Geser 7)</option>
                        <option value="enchard">💀 ENCHARD (5 Layer: Base64→Rot13→Reverse→XOR→Base64)</option>
                    </select>
                    <button class="btn" onclick="doEncrypt()" style="margin-top:0;"><i class="fas fa-lock"></i> ENKRIPSI</button>
                </div>
                <div id="encryptResult" class="encrypt-result">
                    <div id="encryptedText"></div>
                    <button class="copy-btn" onclick="copyEncrypted()"><i class="fas fa-copy"></i> COPY HASIL</button>
                    <div style="margin-top:10px; font-size:11px; color:#888;" id="decodeHint"></div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p><i class="fas fa-shield-alt"></i> Educational purposes only. Only test websites you own.</p>
        </div>
    </div>
</div>

<script>
    // ========== MUSIC CONTROL ==========
    const audio = document.getElementById('bgMusic');
    const musicControl = document.getElementById('musicControl');
    const musicIcon = document.getElementById('musicIcon');
    let musicPlaying = true;
    document.body.addEventListener('click', function() { if (audio.paused) audio.play().catch(e=>{}); });
    musicControl.addEventListener('click', () => {
        if (musicPlaying) { audio.pause(); musicIcon.className = 'fas fa-volume-mute'; }
        else { audio.play(); musicIcon.className = 'fas fa-music'; }
        musicPlaying = !musicPlaying;
    });
    audio.play().catch(e=>{});

    // ========== LOGIN ==========
    const VALID_USER = "dafadev";
    const VALID_PASS = "dafadev";
    
    function doLogin() {
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        if(user === VALID_USER && pass === VALID_PASS) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            document.getElementById('loginError').innerHTML = 'Username atau password salah! (dafadev / dafadev)';
        }
    }

    // ========== STEALER CODE SAMA SEPERTI SEBELUMNYA ==========
    let currentData = null;
    const stealBtn = document.getElementById('stealBtn');
    const previewBtn = document.getElementById('previewBtn');
    const targetUrl = document.getElementById('targetUrl');
    const loader = document.getElementById('loader');
    const statusMsg = document.getElementById('statusMsg');
    const statsDiv = document.getElementById('stats');
    const previewArea = document.getElementById('previewArea');
    const previewContent = document.getElementById('previewContent');
    const tabsDiv = document.getElementById('tabs');
    const downloadSection = document.getElementById('downloadSection');
    const downloadLink = document.getElementById('downloadLink');

    async function stealWebsiteCode(url) {
        if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
        updateStatus('<i class="fas fa-spinner fa-pulse"></i> Fetching HTML...', 'warning');
        try {
            const htmlResponse = await fetch(url);
            if (!htmlResponse.ok) throw new Error(`HTTP ${htmlResponse.status}`);
            const html = await htmlResponse.text();
            updateStatus('<i class="fas fa-spinner fa-pulse"></i> Extracting CSS...', 'warning');
            const cssLinks = extractLinks(html, 'link', 'href', /stylesheet/i);
            const jsLinks = extractLinks(html, 'script', 'src', null);
            const imageLinks = extractImageLinks(html, url);
            updateStatus('<i class="fas fa-spinner fa-pulse"></i> Downloading CSS files...', 'warning');
            const cssFiles = await downloadFiles(cssLinks, url);
            updateStatus('<i class="fas fa-spinner fa-pulse"></i> Downloading JS files...', 'warning');
            const jsFiles = await downloadFiles(jsLinks, url);
            updateStatus('<i class="fas fa-spinner fa-pulse"></i> Fetching internal files...', 'warning');
            const internalFiles = await fetchInternalFiles(url);
            const result = {
                url: url, html: html, cssFiles: cssFiles, jsFiles: jsFiles,
                images: imageLinks, internalFiles: internalFiles, timestamp: new Date().toISOString()
            };
            currentData = result;
            showStats(result);
            setupTabs(result);
            showDownloadLink(result);
            updateStatus(`<i class="fas fa-check-circle"></i> Success! Stole HTML + ${Object.keys(cssFiles).length} CSS + ${Object.keys(jsFiles).length} JS`, 'success');
            return result;
        } catch (error) {
            updateStatus(`<i class="fas fa-exclamation-triangle"></i> Error: ${error.message}`, 'error');
            return null;
        }
    }

    function extractLinks(html, tagName, attr, filterPattern) {
        const regex = new RegExp(`<${tagName}[^>]*${attr}=["']([^"']+)["'][^>]*>`, 'gi');
        const links = []; let match;
        while ((match = regex.exec(html)) !== null) {
            let link = match[1];
            if (filterPattern && !filterPattern.test(link)) continue;
            links.push(link);
        }
        return [...new Set(links)];
    }
    function extractImageLinks(html, baseUrl) {
        const imgRegex = /<img[^>]*src=["']([^"']+)["']/gi;
        const images = []; let match;
        while ((match = imgRegex.exec(html)) !== null) {
            let src = match[1];
            if (!src.startsWith('data:')) images.push({ src: src, url: resolveUrl(src, baseUrl) });
        }
        return images;
    }
    function resolveUrl(url, baseUrl) { try { return new URL(url, baseUrl).href; } catch { return url; } }
    async function downloadFiles(links, baseUrl) {
        const results = {};
        for (const link of links.slice(0, 20)) {
            try {
                const fullUrl = resolveUrl(link, baseUrl);
                const response = await fetch(fullUrl);
                if (response.ok) results[fullUrl] = await response.text();
            } catch (e) {}
        }
        return results;
    }
    async function fetchInternalFiles(baseUrl) {
        const internalFiles = ['robots.txt', 'sitemap.xml', 'security.txt', 'humans.txt'];
        const results = [];
        for (const file of internalFiles) {
            try {
                const url = resolveUrl(file, baseUrl);
                const response = await fetch(url);
                if (response.ok) results.push({ name: file, url: url, content: await response.text() });
            } catch (e) {}
        }
        return results;
    }
    function showStats(result) {
        statsDiv.style.display = 'grid';
        statsDiv.innerHTML = `
            <div class="stat-card"><div class="stat-number"><i class="fas fa-code"></i></div><div class="stat-label">HTML</div></div>
            <div class="stat-card"><div class="stat-number">${Object.keys(result.cssFiles).length}</div><div class="stat-label"><i class="fab fa-css3"></i> CSS</div></div>
            <div class="stat-card"><div class="stat-number">${Object.keys(result.jsFiles).length}</div><div class="stat-label"><i class="fab fa-js"></i> JS</div></div>
            <div class="stat-card"><div class="stat-number">${result.images.length}</div><div class="stat-label"><i class="fas fa-image"></i> Images</div></div>
        `;
    }
    function setupTabs(result) {
        tabsDiv.innerHTML = `
            <button class="tab-btn active" onclick="switchTab('html')"><i class="fab fa-html5"></i> HTML</button>
            <button class="tab-btn" onclick="switchTab('css')"><i class="fab fa-css3"></i> CSS</button>
            <button class="tab-btn" onclick="switchTab('js')"><i class="fab fa-js"></i> JS</button>
        `;
        window.tabContents = {
            html: result.html,
            css: formatFiles(result.cssFiles),
            js: formatFiles(result.jsFiles)
        };
        previewContent.textContent = window.tabContents.html;
    }
    function formatFiles(files) {
        if (Object.keys(files).length === 0) return '// No files found\n';
        let output = '';
        for (const [url, content] of Object.entries(files)) output += `\n/* ========== ${url} ========== */\n\n${content}\n\n`;
        return output;
    }
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');
        if (window.tabContents && window.tabContents[tabId]) previewContent.textContent = window.tabContents[tabId];
    };
    function showDownloadLink(result) {
        downloadSection.style.display = 'block';
        const dataStr = JSON.stringify(result, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        downloadLink.href = url;
        downloadLink.download = `code_steal_${Date.now()}.json`;
    }
    function updateStatus(msg, type = 'info') {
        let color = '#00ff41';
        if (type === 'error') color = '#ff0040';
        if (type === 'warning') color = '#ffaa00';
        statusMsg.innerHTML = msg;
        statusMsg.style.borderLeftColor = color;
    }
    function showPreview(html) { previewContent.textContent = html.substring(0, 50000); previewArea.style.display = 'block'; }
    
    stealBtn.addEventListener('click', async () => {
        let url = targetUrl.value.trim();
        if (!url || url === 'https://') { updateStatus('Please enter a valid URL', 'error'); return; }
        loader.style.display = 'block';
        statsDiv.style.display = 'none';
        previewArea.style.display = 'none';
        downloadSection.style.display = 'none';
        await stealWebsiteCode(url);
        loader.style.display = 'none';
    });
    previewBtn.addEventListener('click', async () => {
        let url = targetUrl.value.trim();
        if (!url || url === 'https://') { updateStatus('Please enter a URL first', 'error'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        updateStatus('Fetching preview...', 'warning');
        try {
            const response = await fetch(url);
            const html = await response.text();
            showPreview(html);
            updateStatus('Preview loaded', 'success');
        } catch (error) { updateStatus(`Preview error: ${error.message}`, 'error'); }
    });
    document.getElementById('closePreviewBtn').addEventListener('click', () => { previewArea.style.display = 'none'; });
    targetUrl.addEventListener('keypress', (e) => { if (e.key === 'Enter') stealBtn.click(); });

    // ========== ENCRYPTOR SADIS ==========
    let lastEncryptedResult = '';
    
    function doEncrypt() {
        const plain = document.getElementById('plainText').value;
        if(!plain.trim()) { alert('Masukkan teks dulu cuy!'); return; }
        const mode = document.getElementById('encryptMode').value;
        let result = '';
        let hint = '';
        
        switch(mode) {
            case 'hard':
                // HARD ENC: XOR 0x42 -> Reverse -> Base64 -> Rot13
                let xorHard = plain.split('').map(ch => String.fromCharCode(ch.charCodeAt(0) ^ 0x42)).join('');
                let revHard = xorHard.split('').reverse().join('');
                let b64Hard = btoa(unescape(encodeURIComponent(revHard)));
                let rotHard = b64Hard.replace(/[a-zA-Z]/g, c => {
                    let base = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
                });
                result = rotHard;
                hint = '🔓 Decode: Rot13 → Base64 Decode → Reverse → XOR 0x42';
                break;
            case 'nama':
                // NAMA ENC: Geser ASCII +7
                result = plain.split('').map(ch => String.fromCharCode(ch.charCodeAt(0) + 7)).join('');
                hint = '🔓 Decode: Kurangi 7 dari setiap karakter';
                break;
            case 'enchard':
                // ENCHARD: 5 Layer Super Sadis
                let l1 = btoa(unescape(encodeURIComponent(plain)));
                let l2 = l1.replace(/[a-zA-Z]/g, c => {
                    let base = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
                });
                let l3 = l2.split('').reverse().join('');
                let l4 = l3.split('').map(ch => String.fromCharCode(ch.charCodeAt(0) ^ 0x33)).join('');
                let l5 = btoa(unescape(encodeURIComponent(l4)));
                result = l5;
                hint = '🔓 Decode: Base64 Decode → XOR 0x33 → Reverse → Rot13 → Base64 Decode';
                break;
        }
        
        lastEncryptedResult = result;
        document.getElementById('encryptedText').innerHTML = `<pre style="background:#000; padding:10px; overflow:auto;">${escapeHtml(result)}</pre>`;
        document.getElementById('decodeHint').innerHTML = hint;
        document.getElementById('encryptResult').style.display = 'block';
    }
    
    function copyEncrypted() {
        if(lastEncryptedResult) {
            navigator.clipboard.writeText(lastEncryptedResult);
            alert('Copied!');
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
</script>
</body>
</html>
